server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types application/javascript application/json application/wasm text/css text/plain;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,Keep-Alive,Content-Type,Authorization" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        return 200 "ok\n";
    }

    location /ws {
        proxy_pass http://server:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location ~* \.wasm$ {
        try_files $uri =404;
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location ~* \.(?:js|css|png|svg|ico)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    location / {
        if ($request_method = OPTIONS) {
            return 204;
        }
        try_files $uri $uri/ /index.html;
    }
}
