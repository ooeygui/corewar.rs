version: "3.9"

services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
      args:
        APP_VERSION: ${COREWAR_VERSION:-0.1.0}
    image: corewar-server:${COREWAR_VERSION:-0.1.0}
    environment:
      COREWAR_SERVER_PORT: 9000
      COREWAR_SERVER_LOG_LEVEL: ${COREWAR_SERVER_LOG_LEVEL:-info}
      LEADERBOARD_PATH: ${LEADERBOARD_PATH:-/data/leaderboard.json}
    ports:
      - "${COREWAR_SERVER_PORT:-9000}:9000"
    volumes:
      - leaderboard-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - corewar-internal

  viz:
    build:
      context: ..
      dockerfile: docker/Dockerfile.viz
      args:
        APP_VERSION: ${COREWAR_VERSION:-0.1.0}
    image: corewar-viz:${COREWAR_VERSION:-0.1.0}
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${COREWAR_VIZ_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - corewar-edge
      - corewar-internal

volumes:
  leaderboard-data:

networks:
  corewar-edge:
    driver: bridge
  corewar-internal:
    driver: bridge
    internal: true
